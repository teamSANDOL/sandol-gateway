services:
  gateway:
    build: ./gateway
    ports:
      - "8010:80"
    depends_on:
      - backend
    volumes:
      - ./gateway/default.conf:/etc/nginx/conf.d/default.conf:ro

    command: ["/usr/local/openresty/bin/openresty", "-g", "daemon off;"]

  backend:
    build: ./test_api
    ports:
      - "8011:8011"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8011"]
