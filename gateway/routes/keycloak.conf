# Keycloak reverse proxy under /auth
# - 모든 /auth 하위 경로를 Keycloak 컨테이너로 프록시
# - 정적 자원(테마 CSS, JS, 이미지) 포함
# - X-Forwarded-* 헤더 설정 및 원본 Host/Schema 전달

# 정적 리소스: 캐시 힌트 부여
# location ~* ^/auth/.*\.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
#     expires 1h;
#     proxy_pass http://keycloak:8080;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header X-Forwarded-Host $host;
#     proxy_set_header X-Forwarded-Prefix /auth;
# }

location ^~ /auth/ {
    proxy_pass http://keycloak:8080/auth/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;    # 원호스트 유지
    proxy_set_header X-Forwarded-Proto https;    # NPM이 TLS 종단 → 외부는 https
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  443;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_redirect off;

    # 여기서는 어떤 보안헤더도 추가/변조 금지
    # (OpenResty면 필요 시)
    more_clear_headers 'Content-Security-Policy';
    more_clear_headers 'X-Frame-Options';
    more_clear_headers 'Strict-Transport-Security';
}
