# 산돌이 랜딩페이지 (정적 서빙)
# 게이트웨이가 루트에서 랜딩페이지를 직접 제공합니다.
# 정적 파일 위치: gateway/landing → 컨테이너 /etc/nginx/conf.d/landing
#   (gateway 디렉터리가 /etc/nginx/conf.d 로 마운트되어 함께 포함됩니다)

location = / {
    root /etc/nginx/conf.d/landing;
    try_files /index.html =404;
    charset utf-8;
}

# 랜딩 정적 자산 (로고 등)
location /assets/ {
    root /etc/nginx/conf.d/landing;
    access_log off;
    expires 7d;
    try_files $uri =404;
}

# 파비콘: 브라우저의 자동 /favicon.ico 요청을 산돌이 로고로 응답
location = /favicon.ico {
    root /etc/nginx/conf.d/landing;
    try_files /assets/sandol-logo.png =404;
    access_log off;
    expires 30d;
}

# 산돌이 사장님 이용 가이드 (정적 서빙)
# 정적 파일 위치: gateway/landing/owner-guide/index.html
location = /owner-guide {
    return 301 /owner-guide/;
}
location /owner-guide/ {
    root /etc/nginx/conf.d/landing;
    try_files /owner-guide/index.html =404;
    charset utf-8;
}

# 로그인 완료 페이지 (정적 서빙)
# auth-relay 가 OIDC 콜백 처리 후 이 경로로 최종 리다이렉트합니다.
# 정적 파일 위치: gateway/landing/login-complete/index.html
location = /login-complete {
    return 301 /login-complete/;
}
location /login-complete/ {
    root /etc/nginx/conf.d/landing;
    try_files /login-complete/index.html =404;
    charset utf-8;
}
