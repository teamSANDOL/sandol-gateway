<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인 완료 · 산돌이</title>
<meta name="description" content="산돌이 로그인이 완료되었습니다. 카카오톡 채팅방으로 돌아가 하시려던 작업을 계속해 주세요.">
<meta name="robots" content="noindex">
<meta property="og:title" content="로그인 완료 · 산돌이">
<meta property="og:description" content="로그인이 완료되었습니다. 카카오톡 채팅방으로 돌아가 계속 진행해 주세요.">
<link rel="icon" type="image/png" href="/assets/sandol-logo.png">
<link rel="apple-touch-icon" href="/assets/sandol-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --bg: #FAF9F6;
    --surface: #FFFFFF;
    --ink: #1F2A33;
    --muted: #5D6B76;
    --line: #ECEAE3;
    --brand: #3E96B8;
    --brand-soft: #E3F1F6;
    --ok: #2F9E6A;
    --ok-soft: #E4F5EC;
    --kakao: #FEE500;
    --kakao-ink: #191600;
    --shadow: 0 20px 50px rgba(31, 42, 51, 0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14181C; --surface: #1D2429; --ink: #E9EDF0; --muted: #9AA7B0;
      --line: #313B43; --brand: #6FBEDB; --brand-soft: #1E3540;
      --ok: #52C08A; --ok-soft: #163828;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }
  }
  :root[data-theme="light"] {
    --bg: #FAF9F6; --surface: #FFFFFF; --ink: #1F2A33; --muted: #5D6B76;
    --line: #ECEAE3; --brand: #3E96B8; --brand-soft: #E3F1F6;
    --ok: #2F9E6A; --ok-soft: #E4F5EC; --shadow: 0 20px 50px rgba(31, 42, 51, 0.12);
  }
  :root[data-theme="dark"] {
    --bg: #14181C; --surface: #1D2429; --ink: #E9EDF0; --muted: #9AA7B0;
    --line: #313B43; --brand: #6FBEDB; --brand-soft: #1E3540;
    --ok: #52C08A; --ok-soft: #163828; --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--ink);
    font-family: "Pretendard", "Pretendard Variable", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    line-height: 1.6;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 44px 32px 36px;
    text-align: center;
  }

  .logo {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: block;
    margin: 0 auto 24px;
    object-fit: cover;
  }

  .check {
    width: 76px; height: 76px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: var(--ok-soft);
    color: var(--ok);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 900;
    line-height: 1;
  }
  @media (prefers-reduced-motion: no-preference) {
    .check { animation: pop 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2) both; }
    @keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  }

  h1 {
    font-size: clamp(24px, 6vw, 30px);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
    text-wrap: balance;
  }
  .lede {
    color: var(--muted);
    font-size: 16px;
    margin: 0 0 28px;
  }

  .tip {
    background: var(--brand-soft);
    border: 1px solid var(--brand);
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 14.5px;
    color: var(--ink);
    text-align: center;
  }
  .tip .say {
    display: inline-block;
    background: var(--kakao);
    color: var(--kakao-ink);
    border-radius: 6px;
    padding: 1px 8px;
    font-weight: 800;
    white-space: nowrap;
  }

  footer {
    margin-top: 24px;
    color: var(--muted);
    font-size: 12.5px;
  }

  @media (max-width: 400px) {
    .card { padding: 36px 22px 28px; border-radius: 20px; }
  }
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/assets/sandol-logo.png" alt="산돌이" width="56" height="56">
    <div class="check" aria-hidden="true">✓</div>
    <h1>로그인이 완료되었습니다</h1>
    <p class="lede">이제 카카오톡 채팅방으로 돌아가서<br>하시려던 작업을 계속해 주세요.</p>
    <div class="tip">
      로그인 여부를 확인하고 싶으시다면<br>
      채팅방에 <span class="say">계정정보</span> 를 입력하세요.
    </div>
    <footer>산돌이(SANDOL) · 한국공학대학교 학생 챗봇</footer>
  </main>
</body>
</html>
